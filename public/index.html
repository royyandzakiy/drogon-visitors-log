<!DOCTYPE html>
<html>

<head>
	<title>Drogon Simple App</title>
</head>

<body>
	<h1>Drogon Simple App</h1>
	<t>Welcome!</t>

	<br />
	<button onclick="sendHello()">Say Hello to Backend!</button>
	<br />
	<button onclick="sendHelloKey()">Say Secret Hello to Backend!</button>
	<br />
	<button onclick="window.location.href='/hello-page/Royyan'">Go to Dynamic View (Hello) Page</button>
	<br />
	<div id="response" style="margin-top: 20px; font-weight: bold;"></div>

	<script>
		async function sendHello() {
			const res = await fetch('/hello/Royyan');
			const data = await res.json();
			document.getElementById('response').innerText = data.message;
		}
		async function sendHelloKey() {
			const res = await fetch('/hello-key/Royyan', {
				headers: { 'X-API-KEY': 'secret' } // here we add the API KEY such that the filter will not complain!
			});
			const data = await res.json();
			document.getElementById('response').innerText = data.message;
		}
	</script>
</body>

</html>
